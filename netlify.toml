[build]
  command = "npm run build"
  publish = "out"

# Serverless functions deploy alongside the static site. `submission-created`
# is a reserved name Netlify triggers on every verified form submission.
[functions]
  directory = "netlify/functions"

# Daily ping (06:00 UTC) that keeps the free-tier Supabase project from pausing
# on inactivity. See netlify/functions/keep-alive.js.
[functions."keep-alive"]
  schedule = "0 6 * * *"

[build.environment]
  NODE_VERSION = "20"
